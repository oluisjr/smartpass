<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SmartPass • Recepção</title>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <!-- Montserrat -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700&display=swap" rel="stylesheet">

  <style>
    body{ font-family:'Montserrat', system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif; margin:0; }
    :root{
      --sand-0:#ffffff;--sand-1:#fbf7ef;--sand-2:#f5efe3;
      --ink:#141414;--muted:#6b6b6b;--glow: rgba(206, 180, 136, .95);--glowSoft: rgba(206, 180, 136, .35);
      --cardBg: rgba(255,255,255,.86);--cardStroke: rgba(20,20,20,.08);
    }
    .sp-page{
      background:
        radial-gradient(900px 520px at 10% -10%, rgba(206,180,136,.18), transparent 60%),
        radial-gradient(740px 480px at 110% 10%, rgba(206,180,136,.10), transparent 55%),
        linear-gradient(180deg, var(--sand-0), var(--sand-2));
      color: var(--ink);
      min-height: 100vh;
    }
    .sp-shell{
      max-width: 1100px;
      margin: 0 auto;
      padding: 22px 16px 28px;
    }
    .sp-card{
      background: var(--cardBg);
      border: 1px solid var(--cardStroke);
      border-radius: 18px;
      backdrop-filter: blur(10px);
      box-shadow: 0 18px 60px rgba(0,0,0,.10);
    }
    .sp-lightbar{
      height:2px;
      background: linear-gradient(90deg, rgba(206,180,136,0), var(--glow), rgba(206,180,136,0));
      box-shadow: 0 0 10px var(--glowSoft), 0 0 18px rgba(206,180,136,.18);
    }
    .sp-muted{ color: var(--muted); }
    .sp-title{ font-weight:650; letter-spacing:-0.01em; }
  </style>

</head>
<body class="p-6">
  <div class="max-w-6xl mx-auto">
    <div class="flex items-center justify-between gap-4 mb-6">
      <div class="flex items-center gap-3">
        <div class="w-11 h-11 rounded-2xl glass stroke flex items-center justify-center font-black tracking-widest text-cyan-300">CSN</div>
        <div>
          <div class="text-xl font-black">Modo Recepção</div>
          <div id="subtitle" class="text-sm text-gray-400">—</div>
        </div>
      </div>
      <div class="flex items-center gap-2">
        <a id="back" class="px-4 py-2 rounded-xl glass stroke text-sm font-semibold" href="#">Voltar ao painel</a>
      </div>
    </div>

    <div class="grid md:grid-cols-3 gap-4">
      <div class="md:col-span-1 glass stroke rounded-2xl p-4">
        <div class="text-xs text-gray-400">Código do evento</div>
        <div id="code" class="text-5xl font-black tracking-widest mt-1">— — — — — —</div>
        <div id="ttl" class="text-sm text-gray-300 mt-2">Atualizando…</div>
        <div class="text-xs text-gray-500 mt-3">Dica: mostre esse código aos convidados na entrada.</div>
      </div>

      <div class="md:col-span-2 glass stroke rounded-2xl p-4">
        <div class="flex items-center justify-between">
          <div>
            <div class="text-xs text-gray-400">Últimas confirmações</div>
            <div class="text-sm text-gray-300">Atualiza automaticamente</div>
          </div>
          <div class="text-sm">
            <span class="text-gray-400">Presentes:</span>
            <span id="countIn" class="font-black text-cyan-300">0</span>
          </div>
        </div>
        <div id="list" class="mt-4 space-y-2"></div>
      </div>
    </div>
  </div>

<script>
function qp(name){
  const u = new URL(location.href);
  return u.searchParams.get(name);
}
const meeting_id = qp('meeting_id');
document.getElementById('back').href = `/reader?meeting_id=${meeting_id}`;

async function api(url, opts){
  const r = await fetch(url, opts);
  if(!r.ok) throw new Error(await r.text());
  return await r.json();
}

let lastSeen = new Set();

function beep(){
  try{
    const ctx = new (window.AudioContext||window.webkitAudioContext)();
    const o = ctx.createOscillator();
    const g = ctx.createGain();
    o.type='sine';
    o.frequency.value=880;
    g.gain.value=0.05;
    o.connect(g); g.connect(ctx.destination);
    o.start();
    setTimeout(()=>{o.stop(); ctx.close();}, 140);
  }catch(e){}
}

function card(r){
  return `
  <div class="glass stroke rounded-xl p-3 flex items-center justify-between">
    <div>
      <div class="font-semibold">${r.name || ''}</div>
      <div class="text-xs text-gray-400">${r.area || '—'} • ${(r.checked_in_at||'').replace('T',' ').replace('Z','')} UTC</div>
    </div>
    <div class="px-3 py-1 rounded-lg bg-cyan-500/15 text-cyan-200 text-xs font-bold">OK</div>
  </div>`;
}

async function tick(){
  if(!meeting_id) return;
  const stats = await api(`/api/meetings/${meeting_id}/stats`).catch(()=>null);
  if(stats){
    document.getElementById('countIn').textContent = stats.checked_in;
  }
  const code = await api(`/api/meetings/${meeting_id}/code`).catch(()=>null);
  if(code){
    document.getElementById('code').textContent = code.code;
    document.getElementById('ttl').textContent = `Muda em ${code.remaining_s}s`;
  }
  const data = await api(`/api/meetings/${meeting_id}/attendance`).catch(()=>null);
  if(data){
    const checked = (data.invitees||[]).filter(x=>x.checked_in).sort((a,b)=> (b.checked_in_at||'').localeCompare(a.checked_in_at||'')).slice(0,10);
    // detect new
    const newOnes = checked.filter(x => x.checked_in_at && !lastSeen.has(x.id + '|' + x.checked_in_at));
    if(newOnes.length){
      beep();
      newOnes.forEach(x=> lastSeen.add(x.id + '|' + x.checked_in_at));
      document.body.classList.add('pulse');
      setTimeout(()=>document.body.classList.remove('pulse'), 600);
    }
    document.getElementById('list').innerHTML = checked.map(card).join('') || '<div class="text-sm text-gray-400">Nenhuma confirmação ainda.</div>';
    document.getElementById('subtitle').textContent = data.meeting ? `${data.meeting.title} • ${data.meeting.location_name||'—'}` : '—';
  }
}

setInterval(tick, 1500);
tick();
</script>
</body>
</html>
