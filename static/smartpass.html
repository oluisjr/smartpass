<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>SmartPass</title>

  <link rel="icon" type="image/png" href="/static/logo.png" />

  <!-- Samsung Wallet lib -->
  <script src="https://us-cdn-gpp.mcsvc.samsung.com/lib/wallet-card.js" type="text/javascript"></script>

  <style>
    body {
      margin: 0;
      height: 100vh;
      font-family: 'Segoe UI', Arial, sans-serif;
      background: linear-gradient(120deg, #10264b, #010413, #010413, #10264b);
      background-size: 400% 400%;
      animation: bgMove 20s ease infinite;

      display: flex;
      justify-content: center;
      align-items: center;
      color: #e5e7eb;
    }

    @keyframes bgMove {
      0% { background-position: 0% 50%; }
      50% { background-position: 100% 50%; }
      100% { background-position: 0% 50%; }
    }

    .card {
      position: relative;
      background: rgba(10, 25, 48, 0.95);
      border-radius: 20px;
      padding: 28px;
      width: 380px;
      box-shadow: 0 25px 60px rgba(0,0,0,.7);
      text-align: center;
      overflow: hidden;
    }

    .header {
      position: relative;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 12px;
    }

    .header h1 {
      font-size: 26px;
      margin: 0;
      z-index: 2;
    }

    .logo {
      position: absolute;
      width: 96px;
      height: 48px;
      object-fit: contain;
      opacity: 0;
      transform: translateX(-20px);
      animation: logoSlide 2.5s ease forwards;
      animation-delay: 0.8s;
    }

    @keyframes logoSlide {
      0% { opacity: 0; transform: translateX(-20px); }
      100% { opacity: 1; transform: translateX(-140px); }
    }

    .info { font-size: 14px; margin: 4px 0; opacity: 0.9; }
    .info strong { font-size: 16px; }

    .qr { margin: 22px 0; }
    .qr img {
      width: 200px;
      height: 200px;
      background: #ffffff;
      padding: 10px;
      border-radius: 10px;
    }

    .footer { font-size: 12px; opacity: 0.65; margin-top: 10px; }
    .error { color: #f87171; }

    /* Containers dos botões */
    #wallet-buttons{
      margin-top:16px;
      display:flex;
      gap:12px;
      justify-content:center;
      flex-wrap:wrap;
      align-items:center;
    }

    #samsung-wallet-container {
      min-height: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    #google-wallet-container {
      min-height: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
    }

    /* botão do Google via imagem */
    #google-wallet-container a img {
      height: 40px;
      display: block;
    }

    .gw-btn{
      display:flex;
      align-items:center;
      gap:12px;
      padding:10px 14px;
      background:#111;
      border:1px solid rgba(255,255,255,.12);
      border-radius:14px;
      text-decoration:none;
      color:#fff;
      box-shadow:0 10px 30px rgba(0,0,0,.35);
    }

    .gw-btn:hover{ filter:brightness(1.06); }
    .gw-btn:active{ transform:translateY(1px); }

    .gw-icon{
      width:34px;
      height:34px;
      display:flex;
      align-items:center;
      justify-content:center;
      border-radius:10px;
      overflow:hidden;
      flex:0 0 34px;
    }

    .gw-text{ line-height:1.05; text-align:left; }
    .gw-line1{ display:block; font-size:12px; opacity:.9; }
    .gw-line2{ display:block; font-size:18px; font-weight:600; letter-spacing:.2px; }

  </style>
</head>

<body>
  <div class="card">
    <div class="header">
      <h1>SmartPass</h1>
      <img id="logo" class="logo" />
    </div>

    <div id="content">Carregando...</div>

    <div id="wallet-buttons">
      <div id="samsung-wallet-container"></div>
      <div id="google-wallet-container"></div>
    </div>
  </div>

<script>
  /* ================= CONFIG ================= */
  const logoPath = "/static/logo.png";
  document.getElementById("logo").src = logoPath;

  /* ================= TOKEN ================= */
  const params = new URLSearchParams(window.location.search);
  const token = params.get("token");
  const content = document.getElementById("content");

  let smartpassData = null;

  if (!token) {
    content.innerHTML = "<p class='error'>Token não informado</p>";
    throw new Error("Token ausente");
  }

  async function loadSmartPass() {
    try {
      const res = await fetch(`/token-info?token=${encodeURIComponent(token)}`);
      const json = await res.json();

      if (!json.valid) {
        content.innerHTML = `<p class="error">${json.reason}</p>`;
        return;
      }

      smartpassData = json.data;
      const expDate = new Date(smartpassData.exp * 1000).toLocaleString();

      content.innerHTML = `
        <div class="info"><strong>${smartpassData.name}</strong></div>
        <div class="info">${smartpassData.company}</div>
        <div class="info">${smartpassData.event}</div>
        <div class="info">Tipo: ${smartpassData.type}</div>

        <div class="qr">
          <!-- seu backend expõe /qrcode/{id} -->
          <img src="/qrcode/${smartpassData.id}" />
        </div>

        <div class="footer">
          Válido até<br>${expDate}
        </div>
      `;

      // inicia botões
      initSamsungWallet();
      initGoogleWallet();

    } catch (err) {
      console.error(err);
      content.innerHTML = "<p class='error'>Erro ao carregar SmartPass</p>";
    }
  }

  loadSmartPass();

  /* ================= SAMSUNG WALLET ================= */
  async function initSamsungWallet() {
    const container = document.getElementById("samsung-wallet-container");
    if (!smartpassData) return;

    try {
      const response = await fetch("/wallet/samsung", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          id: smartpassData.id,
          name: smartpassData.name,
          company: smartpassData.company,
          event: smartpassData.event
        })
      });

      const data = await response.json();

      if (!data.cdata) {
        console.error("Erro backend Samsung:", data);
        container.innerHTML = "<p class='error' style='font-size:12px'>Samsung indisponível</p>";
        return;
      }

      samsungWallet.addButton({
        partnerCode: "4138017514550138240",
        cardId: "3irbs944vie00",
        cdata: data.cdata,

        RDClickUrl: "https://us-rd.mcsvc.samsung.com/statistics/click/addtowlt?ep=C50C3754FEB24833B30C10B275BB6AB8;cc=GC;ii=4063269063441135936;co=4138017514550138240;cp=1288017491089625089;si=24;pg=4058691328745130560;pi=Aqz68EBXSx6Mv9jsaZxzaA;tp=4138101311500138240;li=0",
        RDImpressionUrl: "https://us-rd.mcsvc.samsung.com/statistics/impression/addtowlt?ep=C50C3754FEB24833B30C10B275BB6AB8;cc=GC;ii=4063269063441135936;co=4138017514550138240;cp=1288017491089625089;si=24;pg=4058691328745130560;pi=Aqz68EBXSx6Mv9jsaZxzaA;tp=4138101311500138240;li=0",

        targetId: "samsung-wallet-container",
        buttonId: "samsung-wallet-btn"
      });

    } catch (e) {
      console.error("Erro Samsung Wallet:", e);
      container.innerHTML = "<p class='error'>Samsung indisponível</p>";
    }
  }

  /* ================= GOOGLE WALLET ================= */
  async function initGoogleWallet() {
    const container = document.getElementById("google-wallet-container");
    if (!smartpassData) return;

    try {
      // (4) No modo seguro, não mandamos o JWT do smartpass pro QR do Google Wallet.
      // O backend vai colocar só o ID no barcode do passe.
      const response = await fetch("/wallet/google", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          id: smartpassData.id,
          name: smartpassData.name,
          company: smartpassData.company,
          event: smartpassData.event,
          type: smartpassData.type
        })
      });

      let data = null;

      if (!response.ok) {
        const txt = await response.text();
        console.error("Google Wallet HTTP", response.status, txt);
        container.innerHTML = `<p class='error' style='font-size:12px'>Google erro ${response.status}: ${txt}</p>`;
        return;
      }

      data = await response.json();

      if (!data.saveUrl) {
        console.error("Google Wallet sem saveUrl:", data);
        container.innerHTML = `<p class='error' style='font-size:12px'>${data.error || "Google sem saveUrl"}</p>`;
        return;
      }


      // Você precisa ter essa imagem em /static/ (ou trocar para um botão estilizado).
      // container.innerHTML = `
      //   <a href="${data.saveUrl}" target="_blank" rel="noopener">
      //     <img src="/static/add-to-google-wallet.png" alt="Save to Google Wallet" />
      //   </a>
      // `;
      container.innerHTML = `
      <a class="gw-btn" href="${data.saveUrl}" target="_blank" rel="noopener" aria-label="Add to Google Wallet">
        <span class="gw-icon" aria-hidden="true">
          <svg width="34" height="34" viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">

            <!-- DEFINIÇÃO DO RECORTE (V vazado) -->
            <defs>
              <mask id="wallet-cut">
                <!-- tudo visível -->
                <rect x="0" y="0" width="64" height="64" fill="white"/>
                <!-- área do V fica transparente -->
                <path
                  d="
                    M0 10
                    C6 14, 14 30, 24 32
                    C30 35, 55 24, 59 20
                    L52 0
                    L0 0
                    Z
                  "
                  fill="black"
                />
              </mask>
            </defs>

            <!-- Cartão verde (mais atrás) -->
            <rect x="12" y="12" width="44" height="26" rx="10" fill="#34A853"/>

            <!-- Cartão amarelo (meio) -->
            <rect x="12" y="16" width="44" height="26" rx="10" fill="#FBBC04"/>

            <!-- Cartão vermelho (mais à frente dos cartões) -->
            <rect x="12" y="20" width="44" height="26" rx="10" fill="#EA4335"/>

            <!-- Carteira azul (mais baixa, com recorte aplicado) -->
            <rect
              x="11"
              y="20"
              width="48"
              height="28"
              rx="10"
              fill="#4285F4"
              mask="url(#wallet-cut)"
            />

          </svg>
        </span>

        <span class="gw-text">
          <span class="gw-line1">Add to</span>
          <span class="gw-line2">Google Wallet</span>
        </span>
      </a>
    `;

    } catch (e) {
      console.error("Erro Google Wallet:", e);
      container.innerHTML = "<p class='error'>Google indisponível</p>";
    }
  }

  /* Atualiza visualmente a cada 5 minutos */
  setInterval(loadSmartPass, 5 * 60 * 1000);
</script>

</body>
</html>
